<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">PatrikZero's Clip Editor icon</title>
  <desc id="desc">Rounded app icon with video frame, waveform, crop corners, and scissors for a clip editor.</desc>

  <defs>
    <linearGradient id="bg" x1="74" y1="48" x2="438" y2="464" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2563EB"/>
      <stop offset="0.58" stop-color="#1D9BF0"/>
      <stop offset="1" stop-color="#16A34A"/>
    </linearGradient>

    <linearGradient id="panel" x1="96" y1="104" x2="416" y2="408" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#EAF2FF" stop-opacity="0.92"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="22" flood-color="#0F172A" flood-opacity="0.26"/>
    </filter>
  </defs>

  <!-- App tile -->
  <rect x="32" y="32" width="448" height="448" rx="104" fill="url(#bg)"/>
  <path d="M82 143C82 105.997 111.997 76 149 76H363C400.003 76 430 105.997 430 143V369C430 406.003 400.003 436 363 436H149C111.997 436 82 406.003 82 369V143Z" fill="#0F172A" opacity="0.14"/>

  <!-- Main editor card -->
  <rect x="84" y="104" width="344" height="304" rx="42" fill="url(#panel)" filter="url(#shadow)"/>

  <!-- Video preview -->
  <rect x="118" y="136" width="276" height="150" rx="24" fill="#0F172A"/>
  <path d="M142 160H370V262H142V160Z" fill="#12213A"/>

  <!-- Play triangle -->
  <path d="M242 179L304 211L242 243V179Z" fill="#FFFFFF" opacity="0.96"/>

  <!-- Crop guides -->
  <path d="M142 175V160H170" fill="none" stroke="#60A5FA" stroke-width="10" stroke-linecap="round"/>
  <path d="M370 247V262H342" fill="none" stroke="#60A5FA" stroke-width="10" stroke-linecap="round"/>

  <!-- PIP frame -->
  <rect x="277" y="154" width="92" height="56" rx="10" fill="#16A34A" opacity="0.95"/>
  <rect x="288" y="166" width="70" height="32" rx="5" fill="#0F172A" opacity="0.88"/>

  <!-- Waveform/timeline -->
  <rect x="118" y="318" width="276" height="54" rx="18" fill="#EFF6FF"/>
  <path d="M139 345H373" stroke="#BFDBFE" stroke-width="4" stroke-linecap="round"/>
  <g stroke="#1D9BF0" stroke-width="7" stroke-linecap="round">
    <path d="M146 337V353"/>
    <path d="M165 329V361"/>
    <path d="M184 341V349"/>
    <path d="M203 323V367"/>
    <path d="M222 334V356"/>
    <path d="M241 315V375"/>
    <path d="M260 332V358"/>
    <path d="M279 341V349"/>
    <path d="M298 324V366"/>
    <path d="M317 335V355"/>
    <path d="M336 329V361"/>
    <path d="M355 338V352"/>
  </g>

  <!-- Red cut marker -->
  <path d="M256 304V388" stroke="#EF4444" stroke-width="8" stroke-linecap="round"/>
  <circle cx="256" cy="304" r="13" fill="#EF4444"/>


  <!-- PZ mark -->
  <text x="256" y="264" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="42" font-weight="900" fill="#FFFFFF" opacity="0.94">PZ</text>
</svg>
